<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日作業集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        background: #f9f9f9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', 'Noto Sans TC', sans-serif;
        padding: 2rem 1.5rem;
        color: #111;
      }

      .container {
        width: 100%;
        max-width: 480px;
      }

      .header {
        margin-bottom: 2.5rem;
      }
      .header h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #111;
      }
      .header p {
        margin-top: 0.4rem;
        font-size: 0.82rem;
        color: #999;
        font-weight: 300;
      }

      .hw-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
        background: #e5e5e5;
        border: 1px solid #e5e5e5;
        border-radius: 12px;
        overflow: hidden;
      }

      .hw-link {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.1rem 1.2rem;
        background: #fff;
        text-decoration: none;
        transition: background 0.15s;
      }
      .hw-link:hover {
        background: #f5f5f5;
      }

      .hw-num {
        font-size: 0.68rem;
        font-weight: 600;
        color: #666;
        letter-spacing: 0.06em;
        width: 28px;
        flex-shrink: 0;
      }
      .hw-info {
        flex: 1;
      }
      .hw-title {
        font-size: 0.92rem;
        font-weight: 500;
        color: #111;
      }
      .hw-desc {
        margin-top: 0.18rem;
        font-size: 0.73rem;
        color: #aaa;
        font-weight: 300;
      }
      .hw-arrow {
        font-size: 0.75rem;
        color: #ccc;
        flex-shrink: 0;
      }

      .footer {
        margin-top: 2rem;
        font-size: 0.7rem;
        color: #ccc;
        letter-spacing: 0.03em;
      }

      @media (max-width: 500px) {
        .header h1 { font-size: 1.25rem; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📋 每日作業集</h1>
        <p>Vibe Coding 課程作業總覽</p>
      </div>

      <div class="hw-list">
        <a class="hw-link" href="hw6/index.html">
          <span class="hw-num">HW6</span>
          <div class="hw-info">
            <div class="hw-title">狗狗年齡轉換器</div>
            <div class="hw-desc">輸入生日，換算毛孩相當於人類幾歲</div>
          </div>
          <span class="hw-arrow">›</span>
        </a>

        <a class="hw-link" href="hw8/index.html">
          <span class="hw-num">HW8</span>
          <div class="hw-info">
            <div class="hw-title">狗狗年齡轉換器 + 記憶生日</div>
            <div class="hw-desc">加入 localStorage，重新整理後自動帶入上次生日</div>
          </div>
          <span class="hw-arrow">›</span>
        </a>
      </div>

      <p class="footer">更多作業持續更新中</p>
    </div>
  </body>
</html>
