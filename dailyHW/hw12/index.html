<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Todo List</title>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --bg-start: #0f172a;
            --bg-end: #312e81;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --item-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-completed: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .background-blobs {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: -1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: #818cf8;
            animation: float 10s ease-in-out infinite alternate;
        }
        .blob-2 {
            bottom: -10%; right: -10%;
            width: 40vw; height: 40vw;
            background: #c084fc;
            animation: float 12s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 480px;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-weight: 700;
            font-size: 2rem;
            background: linear-gradient(to right, #e0e7ff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p.subtitle {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        button.add-btn {
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(129, 140, 248, 0.3);
        }

        button.add-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(129, 140, 248, 0.4);
        }

        button.add-btn:active {
            transform: translateY(0);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: var(--item-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            transition: border-color 0.3s;
        }

        li:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .text {
            flex: 1;
            font-size: 1.05rem;
            word-break: break-word;
            transition: all 0.3s ease;
        }

        .text.completed {
            text-decoration: line-through;
            color: var(--text-completed);
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-left: 12px;
            align-items: center;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .icon-btn.check:hover {
            color: #34d399; /* Emerald 400 */
            border-color: rgba(52, 211, 153, 0.3);
            background: rgba(52, 211, 153, 0.1);
        }

        .icon-btn.delete:hover {
            color: #f87171; /* Red 400 */
            border-color: rgba(248, 113, 113, 0.3);
            background: rgba(248, 113, 113, 0.1);
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 0;
            display: none;
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container" id="app-container">
        <header>
            <h1>My Tasks</h1>
            <p class="subtitle" id="task-count">You have 0 tasks today</p>
        </header>

        <div class="input-group">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            <button id="add-btn" class="add-btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
        
        <div id="empty-state" class="empty-state">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <p>No tasks yet. Add one above!</p>
        </div>

        <ul id="todo-list">
            <!-- Items will be injected here -->
        </ul>
    </div>

    <!-- 搭配使用 motion.js 套件 -->
    <script type="module">
        import { animate, spring } from "https://cdn.jsdelivr.net/npm/motion@11.11.13/+esm";

        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('todo-input');
            const addBtn = document.getElementById('add-btn');
            const list = document.getElementById('todo-list');
            const emptyState = document.getElementById('empty-state');
            const taskCount = document.getElementById('task-count');
            const appContainer = document.getElementById('app-container');

            // 預設資料
            let todos = [
                { id: 1, text: 'Experience the magic of Motion.js', completed: false },
                { id: 2, text: 'Design a beautiful Todo App UI', completed: true },
            ];

            function updateTaskCount() {
                const remaining = todos.filter(t => !t.completed).length;
                taskCount.innerText = `You have ${remaining} incomplete tasks`;
                
                if (todos.length === 0) {
                    emptyState.style.display = 'block';
                    animate(emptyState, { opacity: [0, 1], scale: [0.9, 1] }, { duration: 0.4 });
                } else {
                    emptyState.style.display = 'none';
                }
            }

            function createTodoElement(todo) {
                const li = document.createElement('li');
                li.id = `todo-${todo.id}`;
                li.innerHTML = `
                    <span class="text ${todo.completed ? 'completed' : ''}">${todo.text}</span>
                    <div class="actions">
                        <button class="icon-btn check" onclick="toggleTodo(${todo.id})" title="Toggle Complete">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        <button class="icon-btn delete" onclick="removeTodo(${todo.id})" title="Delete Task">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                return li;
            }

            function render() {
                list.innerHTML = '';
                todos.forEach((todo) => {
                    list.appendChild(createTodoElement(todo));
                });
                updateTaskCount();
            }

            // 將函式掛載到 window 供 onclick 呼叫
            window.toggleTodo = (id) => {
                const todo = todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    
                    const li = document.getElementById(`todo-${id}`);
                    const textSpan = li.querySelector('.text');
                    
                    if (todo.completed) {
                        textSpan.classList.add('completed');
                        animate(textSpan, { opacity: [1, 0.6], filter: ['blur(0px)', 'blur(1px)'] }, { duration: 0.3 });
                        // Add a slight bounce to the check button
                        const checkBtn = li.querySelector('.check');
                        animate(checkBtn, { scale: [1, 1.2, 1], color: ['#94a3b8', '#34d399', '#94a3b8'] }, { duration: 0.4 });
                    } else {
                        textSpan.classList.remove('completed');
                        animate(textSpan, { opacity: [0.6, 1], filter: ['blur(1px)', 'blur(0px)'] }, { duration: 0.3 });
                    }
                    updateTaskCount();
                }
            };

            window.removeTodo = (id) => {
                const li = document.getElementById(`todo-${id}`);
                // 刪除動畫: 向右滑出並淡出
                animate(li, { opacity: 0, x: 50, scale: 0.95 }, { duration: 0.3 }).finished.then(() => {
                    todos = todos.filter(t => t.id !== id);
                    li.remove();
                    updateTaskCount();
                });
            };

            const addTodo = () => {
                const text = input.value.trim();
                if (!text) return;
                
                const newTodo = {
                    id: Date.now(),
                    text,
                    completed: false
                };
                
                todos.unshift(newTodo);
                input.value = '';

                // 移除空狀態（如果存在）
                emptyState.style.display = 'none';

                const li = createTodoElement(newTodo);
                
                list.prepend(li);
                
                try {
                    // 新增動畫: 彈性往下出現
                    animate(li, { opacity: [0, 1], y: [-20, 0], scale: [0.9, 1] }, { duration: 0.5 });
                } catch (e) {
                    console.error("Animation error: ", e);
                    li.style.opacity = 1;
                    li.style.transform = 'none';
                }
                
                updateTaskCount();
            };

            addBtn.addEventListener('click', addTodo);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTodo();
            });

            // 初始渲染
            render();
            
            // 容器進入動畫
            animate(appContainer, { opacity: [0, 1], y: [40, 0] }, { duration: 0.6, easing: spring() });

            // 列表項目的交錯進入動畫 (Stagger effect)
            const listItems = document.querySelectorAll('li');
            listItems.forEach((li, i) => {
                li.style.opacity = 0;
                animate(li, { opacity: [0, 1], y: [20, 0] }, { delay: 0.3 + (i * 0.1), duration: 0.5, easing: spring() });
            });
        });
    </script>
</body>
</html>
