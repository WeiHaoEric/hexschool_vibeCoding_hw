<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe TODO ☕</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
</head>
<body>

  <!-- Header -->
  <header>
    <h1><span>☕</span>Cafe TODO</h1>
  </header>

  <!-- Notification disabled banner -->
  <div id="notification-banner">
    通知權限已被拒絕。請在瀏覽器設定中允許通知以接收提醒。
  </div>

  <!-- Main layout -->
  <main>
    <!-- Left: Calendar Panel -->
    <section id="calendar-panel" aria-label="月曆">
      <div id="calendar-nav">
        <button id="btn-prev-month" aria-label="上個月">&#8249;</button>
        <span id="calendar-month-label"></span>
        <button id="btn-next-month" aria-label="下個月">&#8250;</button>
      </div>
      <div id="calendar-grid" role="grid" aria-label="日期選擇"></div>
    </section>

    <!-- Right: Task Panel -->
    <section id="task-panel" aria-label="任務清單">
      <div id="task-panel-header">
        <span id="selected-date-label"></span>
        <button id="btn-add-task">+ 新增任務</button>
      </div>
      <div id="task-list" role="list"></div>
    </section>
  </main>

  <!-- Add/Edit Task Modal -->
  <div id="task-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
    <div class="modal-box">
      <h2 id="task-modal-title">新增任務</h2>
      <div class="form-group">
        <label for="task-title-input">標題 *</label>
        <input type="text" id="task-title-input" placeholder="任務名稱" maxlength="200" />
      </div>
      <div class="form-group">
        <label for="task-date-input">日期 *</label>
        <input type="date" id="task-date-input" />
      </div>
      <div class="form-group">
        <label for="task-alarm-input">提醒時間（選填）</label>
        <input type="time" id="task-alarm-input" />
      </div>
      <div class="form-error" id="task-form-error" aria-live="polite"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-task-cancel">取消</button>
        <button class="btn-save" id="btn-task-save">儲存</button>
      </div>
    </div>
  </div>

  <!-- Startup Reminder Modal -->
  <div id="reminder-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="reminder-title">
    <div class="modal-box">
      <h2 id="reminder-title">☕ 今日待辦提醒</h2>
      <div id="reminder-task-list"></div>
      <div class="modal-actions">
        <button class="btn-save" id="btn-reminder-confirm">了解，開始今天！</button>
      </div>
    </div>
  </div>

  <!-- JS: load order matters — notifications before app, calendar before app -->
  <script src="js/notifications.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
