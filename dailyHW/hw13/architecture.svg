<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- 定義區 -->
  <defs>
    <!-- 箭頭標記 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00e5ff"/>
    </marker>
    <!-- 節點陰影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" flood-color="#000000"/>
    </filter>
    <!-- 科技感背景網格 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00e5ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#0d1117" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- 標題 -->
  <text x="30" y="35" fill="#00e5ff" font-family="monospace" font-size="18" font-weight="bold" letter-spacing="1">HW13: 中文筆順學習 - 架構流程圖</text>

  <!-- == 連線區 (避免覆蓋節點) == -->
  <!-- Init & Resize -> CreateWriter -->
  <path d="M 250 100 L 250 125 L 550 125 L 550 100" fill="none" stroke="#00e5ff" stroke-width="2"/>
  <path d="M 400 125 L 400 151" fill="none" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- CreateWriter -> LoadChar -->
  <path d="M 400 205 L 400 251" fill="none" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Search -> LoadChar -->
  <path d="M 680 205 L 680 280 L 524 280" fill="none" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- HanziWriter CDN -> LoadChar (外部資源流向) -->
  <path d="M 220 280 L 276 280" fill="none" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LoadChar -> HanziWriter -->
  <path d="M 400 305 L 400 371" fill="none" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Controls -> HanziWriter -->
  <path d="M 400 485 L 400 429" fill="none" stroke="#00e5ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- == 節點與文字區 == -->

  <!-- 1. 頁面初始化 -->
  <rect x="180" y="60" width="140" height="40" rx="8" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="85" text-anchor="middle" font-family="monospace" fill="#00e5ff" font-size="14" font-weight="bold">網頁初始化</text>

  <!-- 2. Resize事件 -->
  <rect x="480" y="60" width="140" height="40" rx="8" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="85" text-anchor="middle" font-family="monospace" fill="#00e5ff" font-size="14" font-weight="bold">window.resize</text>

  <!-- 3. CreateWriter -->
  <rect x="290" y="155" width="220" height="50" rx="8" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text text-anchor="middle" font-family="monospace">
    <tspan x="400" y="175" fill="#00e5ff" font-size="14" font-weight="bold">createWriter()</tspan>
    <tspan x="400" y="195" fill="#80f3ff" font-size="12">計算大小並重置畫布參數</tspan>
  </text>

  <!-- 4. Search -->
  <rect x="580" y="155" width="200" height="50" rx="8" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text text-anchor="middle" font-family="monospace">
    <tspan x="680" y="175" fill="#00e5ff" font-size="14" font-weight="bold">doSearch()</tspan>
    <tspan x="680" y="195" fill="#80f3ff" font-size="12">觸發輸入與字元過濾</tspan>
  </text>

  <!-- 5. LoadChar -->
  <rect x="280" y="255" width="240" height="50" rx="8" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text text-anchor="middle" font-family="monospace">
    <tspan x="400" y="275" fill="#00e5ff" font-size="14" font-weight="bold">loadChar(char)</tspan>
    <tspan x="400" y="295" fill="#80f3ff" font-size="12">取得遠端資料並更新UI狀態</tspan>
  </text>

  <!-- 6. API (外部輔助節點) -->
  <rect x="40" y="255" width="180" height="50" rx="8" stroke-dasharray="4 4" fill="#00e5ff" fill-opacity="0.05" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text text-anchor="middle" font-family="monospace">
    <tspan x="130" y="275" fill="#00e5ff" font-size="14" font-weight="bold">HanziWriter API</tspan>
    <tspan x="130" y="295" fill="#80f3ff" font-size="12">(外部 CDN 筆順資料庫)</tspan>
  </text>

  <!-- 7. target Writer -->
  <rect x="290" y="375" width="220" height="50" rx="8" fill="#00e5ff" fill-opacity="0.15" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text text-anchor="middle" font-family="monospace">
    <tspan x="400" y="395" fill="#00e5ff" font-size="15" font-weight="bold">HanziWriter 實體</tspan>
    <tspan x="400" y="415" fill="#80f3ff" font-size="12">渲染於 #hanzi-target 解析框</tspan>
  </text>

  <!-- 8. Controls -->
  <rect x="230" y="485" width="340" height="70" rx="8" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="2" filter="url(#shadow)"/>
  <text text-anchor="middle" font-family="monospace">
    <tspan x="400" y="508" fill="#00e5ff" font-size="14" font-weight="bold">nextStroke() / prevStroke()</tspan>
    <tspan x="400" y="528" fill="#00e5ff" font-size="14" font-weight="bold">playAnimation()</tspan>
    <tspan x="400" y="548" fill="#80f3ff" font-size="12">觸發互動動畫與筆畫步進控制</tspan>
  </text>
</svg>
